# SonarCloud — https://sonarcloud.io/project/overview?id=farhancss_newlife
# Update sonar.organization / sonar.projectKey if your SonarCloud project uses different values.

sonar.projectKey=new-life-campus-portal
sonar.organization=farhancss
sonar.projectName=New Life Campus Portal

sonar.sourceEncoding=UTF-8
sonar.links.homepage=https://github.com/farhancss/newlife
sonar.links.ci=https://github.com/farhancss/newlife/actions
sonar.links.scm=https://github.com/farhancss/newlife

# PHP application code and tests
sonar.sources=app
sonar.tests=tests
sonar.test.inclusions=tests/**/*.php

# Coverage + test execution reports (generated by `composer test:coverage`)
sonar.php.coverage.reportPaths=build/coverage/clover.xml
sonar.php.tests.reportPath=build/coverage/junit.xml

# Laravel bootstrap / service providers are mostly wiring, not business logic.
sonar.coverage.exclusions=app/Providers/**

# Static analysis (optional — enable when PHPStan report is exported in CI)
# sonar.phpstan.reportPaths=build/phpstan/phpstan-report.json
